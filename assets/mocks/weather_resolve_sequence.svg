<circle cx="120" cy="80" r="1" fill="#f5e89c"/><circle cx="116" cy="78" r="1" fill="#f5e89c"/><circle cx="124" cy="78" r="1" fill="#f5e89c"/>
<rect x="0" y="84" width="28" height="28" fill="#7ab355"/><rect x="28" y="84" width="28" height="28" fill="#7ab355"/><rect x="56" y="84" width="28" height="28" fill="#7ab355"/><rect x="84" y="84" width="28" height="28" fill="#7ab355"/><rect x="112" y="84" width="28" height="28" fill="#7ab355"/>
</g>
<text class="s" x="14" y="208">Goal reached!</text>
<g transform="translate(20,216)">
<polygon points="10,0 12,7 19,7 14,12 16,18 10,15 4,18 6,12 1,7 8,7" fill="#f5e89c"/>
<polygon points="40,0 42,7 49,7 44,12 46,18 40,15 34,18 36,12 31,7 38,7" fill="#f5e89c"/>
