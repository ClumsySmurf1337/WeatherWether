</g>

<!-- PANEL 2: RESOLVING -->
<g transform="translate(210,60)">
<rect class="panel" width="170" height="340"/>
<text class="lbl" x="46" y="20">2. RESOLVING</text>
<text class="s" x="14" y="34">Cards apply in order</text>
<g transform="translate(15,44)">
<rect width="140" height="140" fill="#1a2840"/>
<rect x="0" y="0" width="28" height="28" fill="#7ab355"/><rect x="28" y="0" width="28" height="28" fill="#7ab355"/><rect x="56" y="0" width="28" height="28" fill="#2e5c8a"/><rect x="84" y="0" width="28" height="28" fill="#2e5c8a"/><rect x="112" y="0" width="28" height="28" fill="#7ab355"/>
