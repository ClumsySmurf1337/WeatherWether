<rect x="28" y="56" width="28" height="28" fill="#7ab355"/><rect x="56" y="56" width="28" height="28" fill="#7ab355"/><rect x="84" y="56" width="28" height="28" fill="#7ab355"/><rect x="112" y="56" width="28" height="28" fill="#3a3a3a"/><path d="M120,80 L132,68 L132,80 Z" fill="#cc2222"/>
<rect x="0" y="84" width="28" height="28" fill="#7ab355"/><rect x="28" y="84" width="28" height="28" fill="#7ab355"/><rect x="56" y="84" width="28" height="28" fill="#7ab355"/><rect x="84" y="84" width="28" height="28" fill="#7ab355"/><rect x="112" y="84" width="28" height="28" fill="#7ab355"/>
</g>
<text class="s" x="14" y="208">Queue: [FROST, FROST]</text>
<rect x="14" y="216" width="40" height="22" fill="#7ad8e8" stroke="#fff"/><text class="s" x="20" y="230" fill="#0a1628">FROST</text>
<rect x="58" y="216" width="40" height="22" fill="#7ad8e8" stroke="#fff"/><text class="s" x="64" y="230" fill="#0a1628">FROST</text>
