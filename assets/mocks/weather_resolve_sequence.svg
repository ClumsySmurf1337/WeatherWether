<rect x="0" y="84" width="28" height="28" fill="#7ab355"/><rect x="28" y="84" width="28" height="28" fill="#7ab355"/><rect x="56" y="84" width="28" height="28" fill="#7ab355"/><rect x="84" y="84" width="28" height="28" fill="#7ab355"/><rect x="112" y="84" width="28" height="28" fill="#7ab355"/>
<rect x="56" y="28" width="28" height="56" fill="#fff" opacity="0.4"/>
</g>
<text class="s" x="14" y="208">Queue resolving:</text>
<rect x="14" y="216" width="40" height="22" fill="#3a3a3a" stroke="#5a6678"/><text class="s" x="22" y="230" fill="#888">done</text>
<rect x="58" y="216" width="40" height="22" fill="#7ad8e8" stroke="#f5e89c" stroke-width="2"/><text class="s" x="64" y="230" fill="#0a1628">▶FROST</text>
<text class="s" x="14" y="256">State: RESOLVING</text>
<text class="s" x="14" y="270">Frost effect 700ms</text>
<text class="s" x="14" y="284">Water → ICE commits</text>
<text class="s" x="14" y="298">at frame 4 (467ms)</text>
<text class="s" x="14" y="312">150ms inter-card pause</text>
<text class="s" x="14" y="326">Sky still IDLE</text>
</g>

<!-- PANEL 3: WALKING -->
<g transform="translate(400,60)">
