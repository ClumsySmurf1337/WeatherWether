<circle cx="14" cy="70" r="2" fill="#f5e89c"/><circle cx="42" cy="70" r="2" fill="#f5e89c"/><circle cx="70" cy="70" r="2" fill="#f5e89c"/><circle cx="98" cy="70" r="2" fill="#f5e89c"/><circle cx="126" cy="70" r="2" fill="#f5e89c"/>
<rect x="62" y="62" width="10" height="14" fill="#3a4a6a"/><circle cx="64" cy="66" r="0.6" fill="#fff"/><circle cx="69" cy="66" r="0.6" fill="#fff"/>
</g>
<text class="s" x="14" y="208">Path: 5 tiles, 1250ms</text>
<text class="s" x="14" y="224">Walk cycle 250ms/tile</text>
<rect x="14" y="234" width="124" height="6" fill="#0a1628" stroke="#3a5f8a"/>
<rect x="14" y="234" width="62" height="6" fill="#5fc97e"/>
<text class="s" x="14" y="262">State: WALKING</text>
<text class="s" x="14" y="276">CharController.step()</text>
<text class="s" x="14" y="290">walk_E anim playing</text>
<text class="s" x="14" y="304">Tile 3/5 (mid-walk)</text>
<text class="s" x="14" y="320">No deaths detected</text>
</g>

