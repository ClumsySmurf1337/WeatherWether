<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" shape-rendering="crispEdges">
<style>.bg{fill:#0a1628}.panel{fill:#142844;stroke:#3a5f8a;stroke-width:2}.t{font:11px monospace;fill:#e8eef7}.s{font:9px monospace;fill:#aab8c8}.title{font:bold 12px monospace;fill:#f5e89c}.lbl{font:bold 10px monospace;fill:#5fc97e}</style>
<rect class="bg" width="760" height="420"/>
<text class="title" x="20" y="26">WEATHER RESOLVE STORYBOARD — 4 STATES</text>
<text class="s" x="20" y="42">animation_director.gd: PLANNING → RESOLVING → WALKING → COMPLETE</text>

<!-- PANEL 1: PLANNING -->
<g transform="translate(20,60)">
<rect class="panel" width="170" height="340"/>
<text class="lbl" x="48" y="20">1. PLANNING</text>
<text class="s" x="14" y="34">Player queues cards</text>
<g transform="translate(15,44)">
<rect width="140" height="140" fill="#1a2840"/>
<rect x="0" y="0" width="28" height="28" fill="#7ab355"/><rect x="28" y="0" width="28" height="28" fill="#7ab355"/><rect x="56" y="0" width="28" height="28" fill="#2e5c8a"/><rect x="84" y="0" width="28" height="28" fill="#2e5c8a"/><rect x="112" y="0" width="28" height="28" fill="#7ab355"/>
<rect x="0" y="28" width="28" height="28" fill="#7ab355"/><rect x="28" y="28" width="28" height="28" fill="#7ab355"/><rect x="56" y="28" width="28" height="28" fill="#2e5c8a"/><rect x="84" y="28" width="28" height="28" fill="#7ab355"/><rect x="112" y="28" width="28" height="28" fill="#7ab355"/>
