<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" shape-rendering="crispEdges">
<style>.bg{fill:#0a1628}.panel{fill:#142844;stroke:#3a5f8a;stroke-width:3}.t{font:18px monospace;fill:#e8eef7}.s{font:14px monospace;fill:#aab8c8}.title{font:bold 28px monospace;fill:#f5e89c}.btn{fill:#5fc97e;stroke:#fff;stroke-width:3}.kbd{font:bold 12px monospace;fill:#f5e89c}.hint{font:11px monospace;fill:#aab8c8}</style>
<rect class="bg" width="1920" height="1080"/>

<!-- LEFT SIDEBAR (240px) -->
<rect class="panel" x="20" y="20" width="240" height="1040"/>
<text class="title" x="40" y="70">W1 · L05</text>
<text class="s" x="40" y="98">Lighthouse Keeper</text>
<text class="t" x="40" y="140" fill="#f5e89c">★★☆</text>
<text class="hint" x="40" y="162">Best: 1:18  ·  Par: 5</text>
<line x1="40" y1="190" x2="240" y2="190" stroke="#3a5f8a" stroke-width="1"/>
<text class="s" x="40" y="220">PROGRESS</text>
<rect x="40" y="232" width="180" height="14" fill="#0a1628" stroke="#3a5f8a"/>
<rect x="40" y="232" width="36" height="14" fill="#5fc97e"/>
<text class="hint" x="40" y="266">5 / 22 levels</text>
<line x1="40" y1="290" x2="240" y2="290" stroke="#3a5f8a" stroke-width="1"/>
<rect x="40" y="310" width="200" height="50" fill="#142844" stroke="#3a5f8a" stroke-width="2"/>
<text class="t" x="60" y="342">⏸ MENU</text><text class="kbd" x="200" y="342">ESC</text>
<rect x="40" y="372" width="200" height="50" fill="#142844" stroke="#3a5f8a" stroke-width="2"/>
<text class="t" x="60" y="404">↻ RESTART</text><text class="kbd" x="200" y="404">R</text>
<rect x="40" y="434" width="200" height="50" fill="#142844" stroke="#3a5f8a" stroke-width="2"/>
<text class="t" x="60" y="466">💡 HINT</text><text class="kbd" x="200" y="466">H</text>
<rect x="40" y="496" width="200" height="50" fill="#142844" stroke="#3a5f8a" stroke-width="2"/>
<text class="t" x="60" y="528">⚙ SETTINGS</text>
<rect x="40" y="558" width="200" height="50" fill="#142844" stroke="#3a5f8a" stroke-width="2"/>
<text class="t" x="60" y="590">⌂ WORLD MAP</text>
<line x1="40" y1="640" x2="240" y2="640" stroke="#3a5f8a" stroke-width="1"/>
<text class="s" x="40" y="668">CARDS USED</text>
<text class="hint" x="40" y="690">RAIN ×0 of 3</text>
<text class="hint" x="40" y="708">SUN ×0 of 2</text>
<text class="hint" x="40" y="726">FROST ×2 of 2</text>
<text class="hint" x="40" y="744">LIGHT ×0 of 1</text>
<text class="hint" x="40" y="762">FOG ×0 of 1</text>
<line x1="40" y1="790" x2="240" y2="790" stroke="#3a5f8a" stroke-width="1"/>
<text class="s" x="40" y="818">MOVES: 2 / 5</text>
<text class="hint" x="40" y="840">par 5 = 3 stars</text>

<!-- CENTER GRID — 7x7 at 100px tiles, centered ~290..990 horizontal, 180..880 vertical -->
<g transform="translate(380,180)">
<rect x="-20" y="-20" width="740" height="740" fill="#1a2840" stroke="#3a5f8a" stroke-width="2"/>
<!-- Row 0 -->
<rect x="0" y="0" width="100" height="100" fill="#7ab355"/><rect x="100" y="0" width="100" height="100" fill="#7ab355"/><rect x="200" y="0" width="100" height="100" fill="#6a6a6a"/><rect x="300" y="0" width="100" height="100" fill="#6a6a6a"/><rect x="400" y="0" width="100" height="100" fill="#6a6a6a"/><rect x="500" y="0" width="100" height="100" fill="#7ab355"/><rect x="600" y="0" width="100" height="100" fill="#7ab355"/>
<!-- Row 1 -->
<rect x="0" y="100" width="100" height="100" fill="#7ab355"/><rect x="100" y="100" width="100" height="100" fill="#2e5c8a"/><rect x="200" y="100" width="100" height="100" fill="#2e5c8a"/><rect x="300" y="100" width="100" height="100" fill="#2e5c8a"/><rect x="400" y="100" width="100" height="100" fill="#7ab355"/><rect x="500" y="100" width="100" height="100" fill="#7ab355"/><rect x="600" y="100" width="100" height="100" fill="#7ab355"/>
<!-- Row 2 START -->
<rect x="0" y="200" width="100" height="100" fill="#2a4a2a"/><circle cx="50" cy="250" r="32" fill="none" stroke="#f5e89c" stroke-width="3"/><circle cx="50" cy="250" r="6" fill="#f5e89c"/>
<rect x="100" y="200" width="100" height="100" fill="#7ab355"/><rect x="200" y="200" width="100" height="100" fill="#5c3a1f"/><rect x="300" y="200" width="100" height="100" fill="#7ab355"/>
<!-- ICE tiles (frosted earlier) -->
<rect x="400" y="200" width="100" height="100" fill="#a8d8e8"/><line x1="412" y1="220" x2="448" y2="260" stroke="#fff" stroke-width="2"/><line x1="460" y1="216" x2="488" y2="280" stroke="#fff" stroke-width="2"/>
<rect x="500" y="200" width="100" height="100" fill="#a8d8e8"/><line x1="512" y1="220" x2="548" y2="260" stroke="#fff" stroke-width="2"/><line x1="560" y1="216" x2="588" y2="280" stroke="#fff" stroke-width="2"/>
<rect x="600" y="200" width="100" height="100" fill="#7ab355"/>
<!-- Row 3 -->
<rect x="0" y="300" width="100" height="100" fill="#7ab355"/><rect x="100" y="300" width="100" height="100" fill="#7ab355"/><rect x="200" y="300" width="100" height="100" fill="#3d7a3d"/><circle cx="220" cy="335" r="3" fill="#a8d8e8"/><circle cx="270" cy="370" r="3" fill="#a8d8e8"/><rect x="300" y="300" width="100" height="100" fill="#2e5c8a"/><rect x="400" y="300" width="100" height="100" fill="#2e5c8a"/><rect x="500" y="300" width="100" height="100" fill="#7ab355"/><rect x="600" y="300" width="100" height="100" fill="#7ab355"/>
<!-- Row 4 -->
<rect x="0" y="400" width="100" height="100" fill="#6a6a6a"/><rect x="100" y="400" width="100" height="100" fill="#7ab355"/><rect x="200" y="400" width="100" height="100" fill="#7ab355"/><rect x="300" y="400" width="100" height="100" fill="#5c3a1f"/><rect x="400" y="400" width="100" height="100" fill="#7ab355"/><rect x="500" y="400" width="100" height="100" fill="#3a2810"/><rect x="600" y="400" width="100" height="100" fill="#6a6a6a"/>
