<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" shape-rendering="crispEdges">
<style>.bg{fill:#0a1628}.panel{fill:#142844;stroke:#3a5f8a;stroke-width:2}.t{font:11px monospace;fill:#e8eef7}.s{font:9px monospace;fill:#aab8c8}.title{font:bold 14px monospace;fill:#f5e89c}.btn{fill:#5fc97e;stroke:#fff;stroke-width:2}</style>
<rect class="bg" width="360" height="640"/>
<!-- Top HUD -->
<rect class="panel" x="10" y="10" width="340" height="48"/>
<text class="title" x="20" y="32">W1 · L05</text>
<text class="s" x="20" y="46">Find the lighthouse keeper</text>
<text class="t" x="280" y="32">★★☆</text>
<rect x="280" y="38" width="60" height="14" class="panel"/>
<text class="s" x="288" y="48">⏸ MENU</text>
<!-- Grid 7x7, 40px tiles, offset 20,80 -->
<g transform="translate(20,80)">
<!-- Background fill -->
<rect width="280" height="280" fill="#0a1628"/>
<!-- Row 0 -->
<rect x="0" y="0" width="40" height="40" fill="#7ab355"/><rect x="40" y="0" width="40" height="40" fill="#7ab355"/><rect x="80" y="0" width="40" height="40" fill="#6a6a6a"/><rect x="120" y="0" width="40" height="40" fill="#6a6a6a"/><rect x="160" y="0" width="40" height="40" fill="#6a6a6a"/><rect x="200" y="0" width="40" height="40" fill="#7ab355"/><rect x="240" y="0" width="40" height="40" fill="#7ab355"/>
<!-- Row 1 -->
<rect x="0" y="40" width="40" height="40" fill="#7ab355"/><rect x="40" y="40" width="40" height="40" fill="#2e5c8a"/><rect x="80" y="40" width="40" height="40" fill="#2e5c8a"/><rect x="120" y="40" width="40" height="40" fill="#2e5c8a"/><rect x="160" y="40" width="40" height="40" fill="#7ab355"/><rect x="200" y="40" width="40" height="40" fill="#7ab355"/><rect x="240" y="40" width="40" height="40" fill="#7ab355"/>
<!-- Row 2 START at 0,2 -->
<rect x="0" y="80" width="40" height="40" fill="#2a4a2a"/><circle cx="20" cy="100" r="14" fill="none" stroke="#f5e89c" stroke-width="2"/><circle cx="20" cy="100" r="2" fill="#f5e89c"/>
<rect x="40" y="80" width="40" height="40" fill="#7ab355"/><rect x="80" y="80" width="40" height="40" fill="#5c3a1f"/><rect x="120" y="80" width="40" height="40" fill="#7ab355"/><rect x="160" y="80" width="40" height="40" fill="#a8d8e8"/><line x1="165" y1="95" x2="180" y2="110" stroke="#fff" stroke-width="1"/><rect x="200" y="80" width="40" height="40" fill="#a8d8e8"/><line x1="205" y1="95" x2="220" y2="110" stroke="#fff" stroke-width="1"/><rect x="240" y="80" width="40" height="40" fill="#7ab355"/>
<!-- Row 3 -->
<rect x="0" y="120" width="40" height="40" fill="#7ab355"/><rect x="40" y="120" width="40" height="40" fill="#7ab355"/><rect x="80" y="120" width="40" height="40" fill="#3d7a3d"/><circle cx="92" cy="135" r="2" fill="#a8d8e8"/><circle cx="108" cy="148" r="2" fill="#a8d8e8"/><rect x="120" y="120" width="40" height="40" fill="#2e5c8a"/><rect x="160" y="120" width="40" height="40" fill="#2e5c8a"/><rect x="200" y="120" width="40" height="40" fill="#7ab355"/><rect x="240" y="120" width="40" height="40" fill="#7ab355"/>
<!-- Row 4 -->
<rect x="0" y="160" width="40" height="40" fill="#6a6a6a"/><rect x="40" y="160" width="40" height="40" fill="#7ab355"/><rect x="80" y="160" width="40" height="40" fill="#7ab355"/><rect x="120" y="160" width="40" height="40" fill="#5c3a1f"/><rect x="160" y="160" width="40" height="40" fill="#7ab355"/><rect x="200" y="160" width="40" height="40" fill="#3a2810"/><path d="M204,184 L220,164 L236,184 Z" fill="#5fc97e"/><rect x="240" y="160" width="40" height="40" fill="#6a6a6a"/>
<!-- Row 5 -->
<rect x="0" y="200" width="40" height="40" fill="#6a6a6a"/><rect x="40" y="200" width="40" height="40" fill="#2e5c8a"/><rect x="80" y="200" width="40" height="40" fill="#2e5c8a"/><rect x="120" y="200" width="40" height="40" fill="#7ab355"/><rect x="160" y="200" width="40" height="40" fill="#7ab355"/><rect x="200" y="200" width="40" height="40" fill="#7ab355"/><rect x="240" y="200" width="40" height="40" fill="#3a3a3a"/><rect x="262" y="208" width="3" height="24" fill="#8a6a3a"/><path d="M265,208 L280,212 L265,218 Z" fill="#cc2222"/>
<!-- Row 6 GOAL -->
<rect x="0" y="240" width="40" height="40" fill="#7ab355"/><rect x="40" y="240" width="40" height="40" fill="#7ab355"/><rect x="80" y="240" width="40" height="40" fill="#7ab355"/><rect x="120" y="240" width="40" height="40" fill="#7ab355"/><rect x="160" y="240" width="40" height="40" fill="#7ab355"/><rect x="200" y="240" width="40" height="40" fill="#7ab355"/><rect x="240" y="240" width="40" height="40" fill="#7ab355"/>
<!-- Sky character at start tile -->
<rect x="14" y="88" width="12" height="16" fill="#3a4a6a"/><circle cx="17" cy="93" r="0.8" fill="#fff"/><circle cx="22" cy="93" r="0.8" fill="#fff"/>
<!-- Grid lines -->
<g stroke="#1a2840" stroke-width="0.5"><line x1="0" y1="0" x2="280" y2="0"/><line x1="0" y1="40" x2="280" y2="40"/><line x1="0" y1="80" x2="280" y2="80"/><line x1="0" y1="120" x2="280" y2="120"/><line x1="0" y1="160" x2="280" y2="160"/><line x1="0" y1="200" x2="280" y2="200"/><line x1="0" y1="240" x2="280" y2="240"/><line x1="0" y1="280" x2="280" y2="280"/><line x1="0" y1="0" x2="0" y2="280"/><line x1="40" y1="0" x2="40" y2="280"/><line x1="80" y1="0" x2="80" y2="280"/><line x1="120" y1="0" x2="120" y2="280"/><line x1="160" y1="0" x2="160" y2="280"/><line x1="200" y1="0" x2="200" y2="280"/><line x1="240" y1="0" x2="240" y2="280"/><line x1="280" y1="0" x2="280" y2="280"/></g>
</g>
<!-- Queue strip -->
<rect class="panel" x="10" y="376" width="340" height="50"/>
<text class="s" x="18" y="392">QUEUE (3/5)</text>
<rect x="18" y="396" width="36" height="24" fill="#3aa8e8" stroke="#fff"/><text class="s" x="22" y="412" fill="#fff">RAIN</text>
<rect x="60" y="396" width="36" height="24" fill="#f0b340" stroke="#fff"/><text class="s" x="66" y="412" fill="#fff">SUN</text>
<rect x="102" y="396" width="36" height="24" fill="#a06fe8" stroke="#fff"/><text class="s" x="106" y="412" fill="#fff">LITE</text>
<rect x="144" y="396" width="36" height="24" fill="#142844" stroke="#3a5f8a" stroke-dasharray="3,2"/>
<rect x="186" y="396" width="36" height="24" fill="#142844" stroke="#3a5f8a" stroke-dasharray="3,2"/>
<rect x="290" y="396" width="56" height="24" class="btn"/><text class="s" x="298" y="412" fill="#0a1628">UNDO</text>
<!-- Card hand -->
<rect class="panel" x="10" y="436" width="340" height="120"/>
<text class="s" x="18" y="452">HAND — tap card then tile to queue</text>
<rect x="18" y="458" width="48" height="84" fill="#3aa8e8" stroke="#fff" stroke-width="2"/><text class="s" x="22" y="476" fill="#fff">RAIN</text><text class="s" x="22" y="534" fill="#fff">×3</text>
<rect x="74" y="458" width="48" height="84" fill="#f0b340" stroke="#fff" stroke-width="2"/><text class="s" x="80" y="476" fill="#fff">SUN</text><text class="s" x="80" y="534" fill="#fff">×2</text>
<rect x="130" y="458" width="48" height="84" fill="#7ad8e8" stroke="#fff" stroke-width="2"/><text class="s" x="134" y="476" fill="#0a1628">FROST</text><text class="s" x="134" y="534" fill="#0a1628">×2</text>
<rect x="186" y="458" width="48" height="84" fill="#a06fe8" stroke="#fff" stroke-width="2"/><text class="s" x="190" y="476" fill="#fff">LITE</text><text class="s" x="190" y="534" fill="#fff">×1</text>
<rect x="242" y="458" width="48" height="84" fill="#8a9bb4" stroke="#fff" stroke-width="2"/><text class="s" x="248" y="476" fill="#0a1628">FOG</text><text class="s" x="248" y="534" fill="#0a1628">×1</text>
<!-- Play sequence button -->
<rect class="btn" x="10" y="568" width="340" height="56"/>
<text class="title" x="120" y="602" fill="#0a1628">▶ PLAY SEQUENCE</text>
</svg>
